<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP-800 · Practice Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--s1:rgba(255,255,255,0.04);--s2:rgba(255,255,255,0.07);--s3:rgba(255,255,255,0.10);
  --gb:rgba(255,255,255,0.08);--gbh:rgba(255,255,255,0.16);
  --text:#e2e8f6;--dim:#8892b0;--muted:#3a4060;
  --mono:'JetBrains Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif;
  --d1:#4a9eff;--d2:#00d4aa;--d3:#a78bfa;--amber:#fbbf24;--rose:#fb7185;
  --correct:#4ade80;--wrong:#f87171;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 10% 0%,rgba(74,158,255,0.06) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 90% 100%,rgba(167,139,250,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0}
.masthead{position:sticky;top:0;z-index:100;background:rgba(6,8,16,0.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--gb);padding:12px 36px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.mast-title{font-size:16px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#fff 0%,var(--d3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mast-eye{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.mast-right{display:flex;align-items:center;gap:12px}
.score-display{font-family:var(--mono);font-size:13px;color:var(--d2)}
.filter-pills{display:flex;gap:6px}
.fpill{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:16px;border:1px solid var(--gb);
  color:var(--dim);cursor:pointer;transition:all .15s;background:var(--s1)}
.fpill.active{color:var(--text);background:var(--s2);border-color:var(--gbh)}
.fpill.d1.active{color:var(--d1);background:rgba(74,158,255,0.1);border-color:rgba(74,158,255,0.3)}
.fpill.d2.active{color:var(--d2);background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.3)}
.fpill.d3.active{color:var(--d3);background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.3)}
.page{position:relative;z-index:1;padding:24px 36px 48px;max-width:900px;margin:0 auto}
.progress-bar{height:4px;background:var(--muted);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--d1),var(--d3));border-radius:2px;transition:width .4s}
.q-card{background:var(--s1);border:1px solid var(--gb);border-radius:12px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.q-card.d1::before{background:var(--d1)}.q-card.d2::before{background:var(--d2)}.q-card.d3::before{background:var(--d3)}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.q-num{font-family:var(--mono);font-size:11px;color:var(--dim)}
.q-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid;font-weight:600}
.badge-d1{color:var(--d1);background:rgba(74,158,255,0.08);border-color:rgba(74,158,255,0.2)}
.badge-d2{color:var(--d2);background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.2)}
.badge-d3{color:var(--d3);background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.2)}
.q-text{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:16px}
.q-code{background:#0d1117;border:1px solid var(--gb);border-radius:6px;padding:10px 12px;
  font-family:var(--mono);font-size:11px;line-height:1.6;margin-bottom:14px;white-space:pre}
.kw{color:#ff7b72}.fn{color:#79c0ff}.str{color:#a5d6ff}.cm{color:#8b949e}.op{color:#d2a8ff}
.options{display:flex;flex-direction:column;gap:8px}
.option{padding:11px 14px;background:var(--s2);border:1px solid var(--gb);border-radius:8px;
  cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;font-size:13px}
.option:hover:not(.answered){border-color:var(--gbh);background:var(--s3)}
.option.correct{border-color:var(--correct);background:rgba(74,222,128,0.08)!important;color:var(--correct)}
.option.wrong{border-color:var(--wrong);background:rgba(248,113,113,0.08)!important;color:var(--wrong)}
.option.reveal-correct{border-color:var(--correct);background:rgba(74,222,128,0.06)!important}
.opt-letter{font-family:var(--mono);font-size:11px;font-weight:700;min-width:20px;flex-shrink:0;margin-top:1px}
.explanation{margin-top:12px;padding:12px 14px;background:rgba(251,191,36,0.06);
  border:1px solid rgba(251,191,36,0.2);border-radius:8px;font-size:12px;color:var(--dim);display:none}
.explanation.show{display:block}
.explanation strong{color:var(--amber);display:block;margin-bottom:4px}
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
.btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
.btn-primary{background:rgba(74,158,255,0.15);border-color:rgba(74,158,255,0.4);color:var(--d1)}
.btn-primary:hover{background:rgba(74,158,255,0.25);border-color:rgba(74,158,255,0.6)}
.btn-ghost{background:var(--s1);border-color:var(--gb);color:var(--dim)}
.btn-ghost:hover{background:var(--s2);color:var(--text)}
.results-card{text-align:center;padding:48px 32px;background:var(--s1);border:1px solid var(--gb);border-radius:16px}
.results-score{font-size:72px;font-family:var(--mono);font-weight:700;margin-bottom:8px}
.results-label{font-size:16px;color:var(--dim);margin-bottom:24px}
.domain-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
.dom-stat{background:var(--s2);border:1px solid var(--gb);border-radius:8px;padding:14px}
.dom-stat-val{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:4px}
.dom-stat-label{font-size:11px;color:var(--dim)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="masthead">
  <div><div class="mast-eye">DP-800 · SQL AI Developer Associate</div><div class="mast-title">Practice Quiz · 50 Questions</div></div>
  <div class="mast-right">
    <div class="score-display">Score: <span id="scoreDisplay">0/0</span></div>
    <div class="filter-pills">
      <span class="fpill active" onclick="setFilter('all',this)">All</span>
      <span class="fpill d1" onclick="setFilter('d1',this)">D1</span>
      <span class="fpill d2" onclick="setFilter('d2',this)">D2</span>
      <span class="fpill d3" onclick="setFilter('d3',this)">D3</span>
    </div>
    <button class="btn btn-ghost" onclick="resetQuiz()">↺ Reset</button>
  </div>
</div>

<div class="page">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="quizContainer"></div>
  <div id="resultsContainer" class="hidden"></div>
</div>

<script>
const questions = [
  // D1 — Design & Develop
  {q:"Which window function assigns sequential integers with no gaps even when there are ties?",opts:["ROW_NUMBER()","RANK()","DENSE_RANK()","NTILE()"],a:2,cat:"d1",exp:"DENSE_RANK() does not skip numbers on ties (1,1,2). RANK() skips (1,1,3). ROW_NUMBER() has no ties."},
  {q:"You need to expose a result set from a stored procedure as a parameterized view-like object that the query optimizer can see into. Which object type is best?",opts:["Multi-statement TVF","Scalar UDF","Inline TVF","View with NOEXPAND hint"],a:2,cat:"d1",exp:"Inline TVF (single SELECT) behaves like a parameterized view — the optimizer can look inside and build efficient plans. Multi-statement TVF hides row count estimates."},
  {q:"A temporal table query needs to return the state of all rows as they existed on January 1, 2024. Which clause is correct?",opts:["WHERE ValidFrom <= '2024-01-01'","FOR SYSTEM_TIME AS OF '2024-01-01'","FOR SYSTEM_TIME BETWEEN '2024-01-01' AND GETDATE()","INNER JOIN history WHERE EndDate = '2024-01-01'"],a:1,cat:"d1",exp:"FOR SYSTEM_TIME AS OF is the point-in-time temporal clause. SQL Server automatically queries the main table and history table to reconstruct state at that moment."},
  {q:"You need to query a graph table to find all users who follow a specific account (direct follow only). Which pattern is correct?",opts:["SELECT u.name FROM Users u WHERE u.following = @target","SELECT u.name FROM Users u, Follows f, Users t WHERE MATCH(u-(f)->t) AND t.id = @target","SELECT u.name FROM Users u JOIN Follows f ON f.from = u.id","SELECT u.name FROM Users u INNER JOIN Follows f MATCH (u,f) ON t.id = @target"],a:1,cat:"d1",exp:"MATCH(u-(f)->t) is the graph traversal syntax. The FROM clause lists the node and edge tables, MATCH defines the pattern, and WHERE filters the target node."},
  {q:"Which JSON function should you use to return a JSON array by aggregating values from multiple rows?",opts:["JSON_OBJECT()","JSON_VALUE()","JSON_ARRAYAGG()","FOR JSON AUTO"],a:2,cat:"d1",exp:"JSON_ARRAYAGG() aggregates values from multiple rows into a JSON array. FOR JSON PATH/AUTO works at the query level but isn't a standalone aggregate function."},
  {q:"An AFTER UPDATE trigger on the Orders table needs to compare old vs new values. Which pseudo-tables are available?",opts:["OLD and NEW","BEFORE_UPDATE and AFTER_UPDATE","inserted and deleted","modified and original"],a:2,cat:"d1",exp:"SQL Server DML triggers use inserted (new/updated values) and deleted (old/before values). For UPDATE: deleted has old values, inserted has new values."},
  {q:"You have a 2-billion-row fact table. Analytical queries scan by year. What design provides the most query performance?",opts:["Non-clustered index on year column","Clustered columnstore index with table partitioned by year","Row-level partitioning with filegroups","In-memory OLTP with DURABILITY=SCHEMA_ONLY"],a:1,cat:"d1",exp:"Clustered columnstore + partition by year enables both: partition elimination (skips other years) and columnstore compression/vectorization for aggregate scans."},
  {q:"A SEQUENCE differs from IDENTITY primarily because:",opts:["SEQUENCE values never have gaps","SEQUENCE can be shared across multiple tables","SEQUENCE is always faster than IDENTITY","SEQUENCE values are always contiguous"],a:1,cat:"d1",exp:"SEQUENCE is a schema-level object and NEXT VALUE FOR can be called from any table/query. IDENTITY is bound to a single column/table. Both can have gaps on rollback."},
  {q:"Which table type provides tamper-evident, cryptographically verified audit history?",opts:["Temporal table","Ledger table","External table","Partitioned table with audit index"],a:1,cat:"d1",exp:"Ledger tables maintain a cryptographic hash chain. Any tampering (deleting history, modifying committed rows) invalidates the chain and is detectable."},
  {q:"You want to fuzzy-match customer names allowing for typos. Which function measures the minimum character edits between two strings?",opts:["JARO_WINKLER_DISTANCE()","EDIT_DISTANCE()","SOUNDEX()","DIFFERENCE()"],a:1,cat:"d1",exp:"EDIT_DISTANCE() returns Levenshtein distance — the count of insertions, deletions, substitutions needed. JARO_WINKLER weights prefix matches more but isn't Levenshtein."},
  // D2 — Security
  {q:"A multi-tenant SaaS application stores all tenants in one table. Users should only see their own tenant's rows. What is the recommended implementation?",opts:["Add WHERE TenantId = @userId to every query","Implement Row-Level Security with a FILTER predicate","Create a view per tenant with SCHEMABINDING","Grant column-level permissions per tenant"],a:1,cat:"d2",exp:"RLS with FILTER predicate is the standard, transparent solution. It applies automatically regardless of query — no risk of developers forgetting WHERE clauses."},
  {q:"A developer with the UNMASK permission queries a table with Dynamic Data Masking on the SSN column. What value is returned?",opts:["XXXX-XX-XXXX (masked)","The actual SSN value","NULL","An error is raised"],a:1,cat:"d2",exp:"UNMASK permission bypasses DDM entirely — the holder sees actual data. DDM only masks for users without UNMASK. db_owner always sees actual values."},
  {q:"Always Encrypted is configured with RANDOMIZED encryption on a SocialSecurityNumber column. A developer writes: WHERE SSN = @input. What happens?",opts:["The query executes successfully using driver-side encryption","The query fails — randomized encrypted columns cannot be used in equality predicates","SQL Server decrypts the column server-side for the comparison","The query returns no rows"],a:1,cat:"d2",exp:"Randomized encryption produces different ciphertext each time, so equality comparison is impossible even with encrypted input. Use DETERMINISTIC if you need to filter/join."},
  {q:"Which combination allows an Azure Function to connect to Azure SQL without a password or connection string secret?",opts:["SQL Authentication with a strong password","Managed Identity + Azure AD token authentication","Service Principal with client secret in Key Vault","OAuth2 bearer token in Authorization header"],a:1,cat:"d2",exp:"System-assigned or user-assigned Managed Identity authenticates to Azure SQL via Azure AD token — no password or secret needed. This is the passwordless pattern."},
  {q:"RLS FILTER vs BLOCK predicates: a BEFORE UPDATE BLOCK predicate prevents what?",opts:["Users from reading rows they don't own","Users from updating rows to make them invisible to themselves","Users from updating rows to make them visible to others","Any UPDATE on the protected table"],a:1,cat:"d2",exp:"BEFORE UPDATE BLOCK prevents a row from being updated to a state where it would not satisfy the filter predicate (i.e., becoming owned by someone else). Prevents data exfiltration via UPDATE."},
  {q:"You need SQL audit log data available for KQL queries alongside other Azure resource logs. Which destination is correct?",opts:["Azure Blob Storage","Log Analytics Workspace","Azure Event Hub","SQL Server Error Log"],a:1,cat:"d2",exp:"Log Analytics Workspace enables KQL querying across multiple Azure resource logs. Event Hub is for streaming to SIEM. Blob is for long-term archive but not interactive KQL."},
  // D2 — Performance
  {q:"A Key Lookup appears in an execution plan for a query on OrderId. What does this indicate and what should you do?",opts:["The index is fragmented — rebuild it","The non-clustered index doesn't include all required columns — add them as INCLUDE columns","The clustered index doesn't match the query filter — add a covering index","Statistics are out of date — run UPDATE STATISTICS"],a:1,cat:"d2",exp:"A key lookup means the optimizer used the non-clustered index to find rows, then went back to the clustered index for additional columns. Adding those columns to the INCLUDE clause eliminates the lookup."},
  {q:"After a deployment, a critical query regressed to a slow plan. Query Store shows the old fast plan is still captured. What is the fastest resolution?",opts:["Rebuild all indexes","Use sp_recompile to force a new plan","Force the old plan via Query Store","Update statistics and let the optimizer recompile"],a:2,cat:"d2",exp:"Query Store forced plans instantly lock the query to a specific plan ID. This is the fastest mitigation for plan regressions while root-cause investigation continues."},
  {q:"Which isolation level eliminates reader-writer blocking without the snapshot overhead affecting writer performance, using row versioning in tempdb?",opts:["SERIALIZABLE","SNAPSHOT","READ COMMITTED SNAPSHOT ISOLATION (RCSI)","REPEATABLE READ"],a:2,cat:"d2",exp:"RCSI is a database-level setting. Readers use row versions (tempdb) instead of acquiring shared locks. Writers still use the same locks as READ COMMITTED. SNAPSHOT provides statement-level consistency but adds more tempdb overhead."},
  {q:"sys.dm_os_wait_stats shows LCK_M_X waits are very high. What does this indicate?",opts:["Memory pressure — add RAM","Exclusive lock contention — queries are blocking each other","Network latency — check bandwidth","TempDB contention — increase data files"],a:1,cat:"d2",exp:"LCK_M_X = exclusive lock waits. Indicates write-write blocking. Root causes: long transactions, missing indexes causing table scans that hold locks too long, or deadlock cycles."},
  // D2 — CI/CD
  {q:"In an SDK-style SQL Database Project, what does the dacpac file contain?",opts:["Executable SQL migration scripts","A compiled snapshot of the declared database schema","Full database backup including data","Connection string and deployment settings"],a:1,cat:"d2",exp:"dacpac (Data-tier Application Package) is a compiled schema snapshot — not scripts. It describes the desired end state. SqlPackage generates differential scripts at deploy time."},
  {q:"A CI pipeline should detect when the deployed database schema has drifted from the SQL project. Which SqlPackage action should you use?",opts:["/Action:Publish","/Action:Extract","/Action:Report","/Action:DeployReport"],a:2,cat:"d2",exp:"/Action:Report compares the dacpac (source) against the target database and outputs an XML report of differences. It does NOT deploy — safe for drift detection in CI."},
  {q:"A tSQLt test calls FakeTable('dbo.Orders') before testing a stored procedure. What is the effect?",opts:["Creates a copy of Orders in a test schema","Replaces Orders with an empty table mock for the duration of the test","Truncates the Orders table","Creates a view over Orders that returns no rows"],a:1,cat:"d2",exp:"FakeTable replaces the real table with an empty structure within the test's transaction. The stored procedure under test runs against the mock, keeping tests isolated and idempotent."},
  {q:"A GitHub workflow deploys to production SQL. Connection strings must not appear in the workflow YAML. What is the correct approach?",opts:["Store in repository secrets and reference as ${{ secrets.CONN_STR }}","Store in the .sqlproj file under SecureSettings","Encode in Base64 and store in workflow env vars","Store in a publish profile checked into the repo"],a:0,cat:"d2",exp:"GitHub repository secrets are the correct mechanism. They are encrypted, not visible in logs, and referenced with ${{ secrets.SECRET_NAME }}. Never store connection strings in committed files."},
  // D2 — DAB & Integration
  {q:"In a DAB config, a developer sets permissions role='anonymous' with action 'read'. What is the effect?",opts:["Only authenticated users can read","Any unauthenticated request can read the entity","Only the service principal can read","Read is disabled for all users"],a:1,cat:"d2",exp:"anonymous role in DAB means the endpoint allows unauthenticated (no JWT) read access. Use for public data only. authenticated requires a valid token."},
  {q:"You need to expose a stored procedure that accepts parameters via a REST POST request using DAB. Which entity source type is needed?",opts:["source.type = 'table'","source.type = 'view'","source.type = 'stored-procedure'","source.type = 'function'"],a:2,cat:"d2",exp:"stored-procedure source type maps an SP to REST/GraphQL. POST method passes parameters. GET is not supported for SPs (parameters via URL would be a security risk)."},
  {q:"You need to track which specific column values changed for CDC-style embedding refresh, with minimal query overhead. Which method fits?",opts:["Change Tracking (SQL)","CDC (Change Data Capture)","Azure Functions SQL Trigger","Temporal table + polling"],a:1,cat:"d2",exp:"CDC captures before/after column values from the transaction log. Change Tracking only captures row identity (changed/not). For embedding refresh you need the new column values, so CDC is required."},
  {q:"An Azure Function should trigger whenever a new row is inserted into the Products table and refresh its embedding. Which binding type is used?",opts:["Azure Service Bus trigger","Cosmos DB change feed trigger","SQL trigger binding (Azure Functions)","Event Grid trigger with SQL connector"],a:2,cat:"d2",exp:"SQL trigger binding for Azure Functions monitors a SQL table for changes (CDC-based) and triggers the function. Ideal for event-driven, serverless embedding refresh."},
  // D3 — Vector & Search
  {q:"A VECTOR column is declared as VECTOR(1536). What does 1536 represent?",opts:["Maximum character length of the stored text","Number of dimensions in the embedding vector","Maximum number of rows the index supports","Compression level for the vector data"],a:1,cat:"d3",exp:"1536 is the number of dimensions (float values) in the vector. OpenAI text-embedding-3-small outputs 1536-dimensional vectors. Dimension count is fixed per model."},
  {q:"Which VECTOR_DISTANCE metric is preferred for text similarity when vectors have NOT been normalized?",opts:["dot_product","cosine","euclidean","manhattan"],a:1,cat:"d3",exp:"cosine distance measures the angle between vectors, independent of magnitude. dot_product gives incorrect similarity scores for non-unit vectors. Always use cosine for text embeddings unless you pre-normalize."},
  {q:"VECTOR_NORMALIZE() is applied to a vector before storing it. What is the primary benefit?",opts:["Reduces storage size","Enables use of dot_product as equivalent to cosine similarity","Speeds up VECTOR_SEARCH index builds","Required for DiskANN index creation"],a:1,cat:"d3",exp:"Normalizing to unit length (magnitude=1) makes dot_product mathematically equivalent to cosine similarity. Pre-normalizing at insert avoids runtime normalization on every query."},
  {q:"Production search requires top-20 similar documents from 10 million rows with latency under 50ms. Which search approach is appropriate?",opts:["ENN with full table scan","ANN with DiskANN vector index","CONTAINS with full-text index","Hybrid search without vector index"],a:1,cat:"d3",exp:"ANN (Approximate Nearest Neighbor) with a DiskANN index achieves O(log n) complexity — feasible at 10M rows under 50ms. ENN is O(n) and would take seconds at that scale."},
  {q:"RRF (Reciprocal Rank Fusion) uses a constant k=60. What is the purpose of this constant?",opts:["Sets the maximum number of results to return","Prevents top-ranked results from dominating the combined score","Normalizes the two score scales to 0–1","Sets the minimum similarity threshold"],a:1,cat:"d3",exp:"k=60 smooths the reciprocal rank curve. Without it, rank-1 result would get score 1.0, rank-2 gets 0.5 — too steep. k=60 makes the distribution more uniform, preventing one highly-ranked result from dominating."},
  {q:"What is the key difference between CONTAINS() and FREETEXT() in full-text search?",opts:["CONTAINS requires a full-text catalog; FREETEXT does not","CONTAINS uses NLP word-breaking; FREETEXT requires exact matches","CONTAINS requires exact/proximity match patterns; FREETEXT applies NLP tokenization and stemming","CONTAINS supports ranking; FREETEXT returns only boolean"],a:2,cat:"d3",exp:"FREETEXT applies NLP: it tokenizes the phrase, applies stemming, drops stopwords, and matches any forms. CONTAINS is more explicit: you control exact phrase, FORMSOF, proximity (NEAR), and Boolean logic."},
  {q:"A hybrid search returns full-text results ranked by FREETEXTTABLE RANK and vector results by VECTOR_DISTANCE. How do you merge these into one ranked list?",opts:["Average the two scores directly","Sort by VECTOR_DISTANCE only (more accurate)","Apply Reciprocal Rank Fusion (RRF) using each result's rank position","Union both result sets and sort by FREETEXTTABLE RANK"],a:2,cat:"d3",exp:"RRF merges ranked lists regardless of score scale (RANK is 0-1000, distance is 0-1). Each document gets 1/(k+rank) from each list; scores are summed and sorted. Scale-invariant and robust."},
  {q:"An external model is created for EMBEDDINGS task. Which T-SQL system stored procedure is used to call this model to generate embeddings within a SQL query?",opts:["sp_invoke_external_rest_endpoint","EXEC CREATE_EMBEDDING()","SELECT EMBEDDING(col) FROM …","sp_execute_external_script"],a:0,cat:"d3",exp:"sp_invoke_external_rest_endpoint calls any REST endpoint, including Azure OpenAI for embeddings. The external model abstraction (CREATE EXTERNAL MODEL) also supports direct AI_GENERATE() in Fabric contexts."},
  // D3 — RAG & Embeddings
  {q:"In the RAG pattern, what is the purpose of the 'augmentation' step?",opts:["Training the language model on your data","Adding retrieved context to the LLM prompt before generation","Indexing the database for fast retrieval","Post-processing the LLM output to remove PII"],a:1,cat:"d3",exp:"Augmentation = injecting retrieved context into the prompt. The LLM receives [user question + relevant DB content] rather than just the question. This grounds the response in your data."},
  {q:"When calling sp_invoke_external_rest_endpoint to invoke Azure OpenAI, where should the API key be stored?",opts:["In a T-SQL variable in the stored procedure","In an environment variable on the SQL server","In a DATABASE SCOPED CREDENTIAL","In the web.config of the calling application"],a:2,cat:"d3",exp:"DATABASE SCOPED CREDENTIAL stores secrets securely in the database, encrypted by the database master key. Referenced by name — never appears in plain text in T-SQL code."},
  {q:"You have retrieved top-5 context documents from hybrid search. You need to pass them as LLM context. Which T-SQL converts the result set to JSON?",opts:["JSON_ARRAYAGG(content)","SELECT content FOR JSON PATH","OPENJSON(content)","JSON_VALUE(content, '$')"],a:1,cat:"d3",exp:"FOR JSON PATH converts a SQL result set to a JSON string. This is used to build the context portion of the LLM prompt payload. FOR JSON AUTO also works but gives less control over structure."},
  {q:"A document table has 500-word articles. Embedding the full article in one vector is producing poor search results. What chunking strategy should you apply first?",opts:["Embed only the article title","Use fixed-size chunking with 100 tokens and 10-token overlap","Store the entire article as a single NVARCHAR(MAX) column","Use BINARY compression before embedding"],a:1,cat:"d3",exp:"Fixed-size chunking (100 tokens, 10-token overlap) is the simplest first step. Overlap prevents context loss at boundaries. Smaller chunks = more focused embeddings = better recall."},
  {q:"For production embedding maintenance on a high-write table, which strategy provides near-real-time freshness with the least impact on write throughput?",opts:["AFTER INSERT/UPDATE trigger that calls embedding API synchronously","Azure Functions SQL trigger binding (CDC-based, async)","Nightly batch job using Change Tracking","INSTEAD OF trigger with async embedding call"],a:1,cat:"d3",exp:"Azure Functions SQL trigger is asynchronous — the write completes immediately and the function processes the change event independently. No write latency impact, near-real-time (seconds), and scales serverlessly."},

  // AI-Assisted Dev
  {q:"A developer wants GitHub Copilot to always use SET NOCOUNT ON and parameterized queries in SQL suggestions. How should this be configured?",opts:["Set it in the VS Code settings.json","Create a .github/copilot-instructions.md file with the conventions","Configure it in the GitHub repository settings UI","Train a custom Copilot model with examples"],a:1,cat:"d2",exp:"copilot-instructions.md defines project-wide conventions for Copilot. Checked into the repo, it applies to all contributors. Supports natural language instructions about coding standards."},

];

let currentFilter = 'all';
let answers = {};
let filteredQs = [];

function setFilter(f, el){
  currentFilter = f;
  document.querySelectorAll('.fpill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  answers = {};
  renderQuiz();
}

function renderQuiz(){
  filteredQs = currentFilter==='all' ? questions : questions.filter(q=>q.cat===currentFilter);
  const container = document.getElementById('quizContainer');
  const letters = ['A','B','C','D'];
  container.innerHTML = filteredQs.map((q,i)=>`
    <div class="q-card ${q.cat}" id="qcard-${i}">
      <div class="q-meta">
        <span class="q-num">Q${i+1} / ${filteredQs.length}</span>
        <span class="q-badge badge-${q.cat}">${q.cat.toUpperCase()}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${q.code?`<div class="q-code">${q.code}</div>`:''}
      <div class="options" id="opts-${i}">
        ${q.opts.map((o,j)=>`
          <div class="option" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
            <span class="opt-letter">${letters[j]}</span>
            <span>${o}</span>
          </div>
        `).join('')}
      </div>
      <div class="explanation" id="exp-${i}">
        <strong>💡 Explanation</strong>${q.exp}
      </div>
    </div>
  `).join('');
  updateScore();
}

function selectAnswer(qi, optIdx){
  if(answers[qi] !== undefined) return;
  answers[qi] = optIdx;
  const q = filteredQs[qi];
  const opts = document.querySelectorAll(`#opts-${qi} .option`);
  opts.forEach(o=>o.classList.add('answered'));
  if(optIdx === q.a){
    opts[optIdx].classList.add('correct');
  } else {
    opts[optIdx].classList.add('wrong');
    opts[q.a].classList.add('reveal-correct');
  }
  document.getElementById(`exp-${qi}`).classList.add('show');
  updateScore();
  updateProgress();
}

function updateScore(){
  const answered = Object.keys(answers).length;
  const correct = Object.entries(answers).filter(([i,a])=>filteredQs[i].a===a).length;
  document.getElementById('scoreDisplay').textContent = `${correct}/${answered}`;
}

function updateProgress(){
  const pct = (Object.keys(answers).length / filteredQs.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetQuiz(){
  answers = {};
  renderQuiz();
  document.getElementById('progressFill').style.width = '0%';
}

renderQuiz();
</script>
